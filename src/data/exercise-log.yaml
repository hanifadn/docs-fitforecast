# =============================================================================
# FitForecast — 8-Month Exercise Log
# Program: 3x per week · Fat Loss + Endurance · Lower Back Safe
# Structure: Workout A (Upper + Core) · Workout B (Lower + Cardio) ·
#            Workout C (Full Body + Endurance)
# =============================================================================

# ── MONTH 1 — Foundation Phase (Weeks 1–4) ───────────────────────────────────

- week: 1
  phase: "Foundation"
  sessions:
    - day: 1
      date: "2026-05-25"
      workout_type: "A — Upper Body + Core"
      duration_minutes: 55
      exercises:
        - name: "Stationary Bike (warm-up)"
          sets: 1
          duration_minutes: 10
          intensity: "easy — RPE 3/10"
          notes: "Low resistance. Focus on breathing."
        - name: "Lat Pulldown (wide grip)"
          sets: 3
          reps: 12
          weight_kg: 30
          rest_seconds: 60
          notes: "Full range. Squeeze lats at bottom. No spinal extension."
        - name: "Seated Cable Row"
          sets: 3
          reps: 12
          weight_kg: 25
          rest_seconds: 60
          notes: "Neutral spine. Pull to lower chest. Controlled eccentric."
        - name: "Chest Press Machine"
          sets: 3
          reps: 12
          weight_kg: 30
          rest_seconds: 60
          notes: "Adjust seat so handles are at mid-chest level."
        - name: "Seated Shoulder Press Machine"
          sets: 3
          reps: 10
          weight_kg: 20
          rest_seconds: 60
          notes: "Supported back. Do not arch lumbar spine."
        - name: "Face Pull (cable)"
          sets: 3
          reps: 15
          weight_kg: 10
          rest_seconds: 45
          notes: "External rotation at end range. Improves posture."
        - name: "Dead Bug"
          sets: 3
          reps: 8
          notes: "Each side. Lower back pressed into floor throughout. CORE PRIORITY."
        - name: "Bird Dog"
          sets: 3
          reps: 8
          notes: "Each side. Slow, controlled. Glute squeeze at full extension."

    - day: 3
      date: "2026-05-27"
      workout_type: "B — Lower Body + Cardio"
      duration_minutes: 60
      exercises:
        - name: "Treadmill Incline Walk (warm-up)"
          sets: 1
          duration_minutes: 10
          speed_kmh: 4.5
          incline_percent: 3
          notes: "Warm-up pace. Focus on posture."
        - name: "Glute Bridge"
          sets: 3
          reps: 15
          notes: "Drive through heels. Hold 2 seconds at top."
        - name: "Goblet Squat"
          sets: 3
          reps: 10
          weight_kg: 8
          rest_seconds: 60
          notes: "Dumbbell held at chest. Depth to parallel only."
        - name: "Leg Press (shallow depth)"
          sets: 3
          reps: 12
          weight_kg: 60
          rest_seconds: 60
          notes: "Feet hip-width. Stop at 90° knee angle."
        - name: "Romanian Deadlift (light)"
          sets: 3
          reps: 10
          weight_kg: 15
          rest_seconds: 60
          notes: "Dumbbells. Hinge from hips. Keep spine neutral."
        - name: "Pallof Press"
          sets: 3
          reps: 10
          weight_kg: 8
          rest_seconds: 45
          notes: "Each side. Anti-rotation core stability."
        - name: "Treadmill Incline Walk (cardio block)"
          sets: 1
          duration_minutes: 15
          speed_kmh: 4.5
          incline_percent: 5
          notes: "Fat loss zone — 65–70% max HR."

    - day: 5
      date: "2026-05-29"
      workout_type: "C — Full Body + Endurance"
      duration_minutes: 65
      exercises:
        - name: "Stationary Bike (cardio block)"
          sets: 1
          duration_minutes: 20
          intensity: "moderate — RPE 5–6/10"
          notes: "Increase resistance every 5 minutes by 1 level."
        - name: "Glute Bridge"
          sets: 2
          reps: 15
          notes: "Activation set before compound movements."
        - name: "Lat Pulldown"
          sets: 2
          reps: 12
          weight_kg: 30
          rest_seconds: 60
        - name: "Goblet Squat"
          sets: 2
          reps: 10
          weight_kg: 8
          rest_seconds: 60
        - name: "Seated Cable Row"
          sets: 2
          reps: 12
          weight_kg: 25
          rest_seconds: 60
        - name: "Dead Bug"
          sets: 2
          reps: 8
          notes: "Each side."
        - name: "Bird Dog"
          sets: 2
          reps: 8
          notes: "Each side."
        - name: "Treadmill Incline Walk (cool-down endurance)"
          sets: 1
          duration_minutes: 15
          speed_kmh: 5.0
          incline_percent: 6
          notes: "Increase incline 1% per week."

- week: 2
  phase: "Foundation"
  sessions:
    - day: 1
      workout_type: "A — Upper Body + Core"
      duration_minutes: 55
      notes: "Same exercises as Week 1. Focus on form quality."
      progression: "Increase reps by 1 on all strength exercises if previous week felt easy."
    - day: 3
      workout_type: "B — Lower Body + Cardio"
      duration_minutes: 60
      notes: "Same exercises as Week 1."
      progression: "Incline walk cardio block: increase to 18 min."
    - day: 5
      workout_type: "C — Full Body + Endurance"
      duration_minutes: 65
      notes: "Same exercises as Week 1."
      progression: "Stationary bike: increase to 22 min."

- week: 3
  phase: "Foundation"
  sessions:
    - day: 1
      workout_type: "A — Upper Body + Core"
      duration_minutes: 58
      notes: "Form consolidation week."
      progression:
        - "Lat Pulldown: +2.5 kg"
        - "Seated Row: +2.5 kg"
        - "Face Pull: +2.5 kg"
    - day: 3
      workout_type: "B — Lower Body + Cardio"
      duration_minutes: 62
      progression:
        - "Goblet Squat: +2 kg (→ 10 kg dumbbell)"
        - "Romanian Deadlift: +2.5 kg"
        - "Cardio block: 20 min incline walk at 6%"
    - day: 5
      workout_type: "C — Full Body + Endurance"
      duration_minutes: 68
      progression:
        - "Stationary bike: 25 min at moderate intensity"
        - "Treadmill incline: 7% at 5.0 km/h"

- week: 4
  phase: "Foundation"
  notes: "Deload / recovery week. All weights reduced 20%. Volume maintained."
  sessions:
    - day: 1
      workout_type: "A — Upper Body + Core (Deload)"
      duration_minutes: 45
    - day: 3
      workout_type: "B — Lower Body + Cardio (Deload)"
      duration_minutes: 50
    - day: 5
      workout_type: "C — Full Body + Endurance (Deload)"
      duration_minutes: 55
      notes: "Reduce bike intensity to RPE 4. Focus on mobility and recovery."

