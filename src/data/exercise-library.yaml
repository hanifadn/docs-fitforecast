# =============================================================================
# FitForecast — Lower Back Safe Exercise Library
# All exercises in this program are cleared for mild lower back pain.
# =============================================================================

approved_exercises:
  core:
    - name: "Dead Bug"
      category: "core"
      lower_back_safety: "excellent"
      notes: "Anti-extension core. Press lower back into floor."
    - name: "Bird Dog"
      category: "core"
      lower_back_safety: "excellent"
      notes: "Anti-rotation and extension. Builds multifidus and erector spinae safely."
    - name: "Pallof Press"
      category: "core"
      lower_back_safety: "excellent"
      notes: "Anti-rotation. Stand or kneel. Cable or band."
    - name: "Plank (forearm)"
      category: "core"
      lower_back_safety: "good"
      notes: "Introduce Month 2+. Keep neutral spine."
      phase_cleared: "Month 2"

  upper_body:
    - name: "Lat Pulldown"
      category: "back"
      lower_back_safety: "excellent"
      notes: "Seated. No spinal extension at bottom."
    - name: "Seated Cable Row"
      category: "back"
      lower_back_safety: "excellent"
      notes: "Neutral spine throughout. Slow eccentric."
    - name: "Face Pull"
      category: "shoulders"
      lower_back_safety: "excellent"
      notes: "External rotation. Posture and shoulder health."
    - name: "Chest Press Machine"
      category: "chest"
      lower_back_safety: "excellent"
      notes: "Supported back. Preferred over free bench press."
    - name: "Incline Dumbbell Press (45°)"
      category: "chest"
      lower_back_safety: "good"
      notes: "Supported. Upper chest."
      phase_cleared: "Month 2"
    - name: "Seated Shoulder Press Machine"
      category: "shoulders"
      lower_back_safety: "excellent"
      notes: "Back supported. No standing overhead press."
    - name: "Cable Lateral Raise"
      category: "shoulders"
      lower_back_safety: "excellent"
      notes: "Standing is fine — no spinal loading."
      phase_cleared: "Month 2"
    - name: "Cable Tricep Pushdown"
      category: "arms"
      lower_back_safety: "excellent"
      notes: "Stand upright — no forward lean."
    - name: "Dumbbell Bicep Curl (seated)"
      category: "arms"
      lower_back_safety: "excellent"
      notes: "Seated removes any temptation to swing/arch lumbar."

  lower_body:
    - name: "Glute Bridge"
      category: "glutes"
      lower_back_safety: "excellent"
      notes: "Phase 1 foundation. Activates glutes without spinal compression."
    - name: "Hip Thrust Machine"
      category: "glutes"
      lower_back_safety: "excellent"
      notes: "Superior glute isolation. Start Month 2."
      phase_cleared: "Month 2"
    - name: "Goblet Squat"
      category: "legs"
      lower_back_safety: "good"
      notes: "Weight forward helps maintain upright torso. Limit depth to 90°."
    - name: "Leg Press (shallow depth)"
      category: "legs"
      lower_back_safety: "good"
      notes: "Shallow depth only (90°)."
    - name: "Romanian Deadlift (light dumbbells)"
      category: "hamstrings/posterior"
      lower_back_safety: "good"
      notes: "Hip hinge only. Neutral spine essential. Light load always."
    - name: "Split Squat (low rear foot elevation)"
      category: "legs"
      lower_back_safety: "good"
      notes: "20 cm step maximum."
      phase_cleared: "Month 3"
    - name: "Step-Up (low box, 20 cm)"
      category: "legs"
      lower_back_safety: "excellent"
      notes: "Unilateral without spinal compression."
      phase_cleared: "Month 2"
    - name: "Cable Pull-Through"
      category: "posterior chain"
      lower_back_safety: "excellent"
      notes: "Hip hinge pattern with cable."
      phase_cleared: "Month 5"

  cardio_endurance:
    - name: "Stationary Bike (upright or recumbent)"
      category: "cardio"
      lower_back_safety: "excellent"
      notes: "Preferred Phase 1 cardio. Zero spinal loading."
    - name: "Treadmill Incline Walk"
      category: "cardio"
      lower_back_safety: "excellent"
      notes: "High caloric burn. Maintain upright posture."
    - name: "Treadmill Jog (progressive)"
      category: "cardio"
      lower_back_safety: "good"
      notes: "Begin jogging intervals Month 3."
      phase_cleared: "Month 3"
    - name: "Elliptical Machine"
      category: "cardio"
      lower_back_safety: "excellent"
      notes: "Low impact. Good alternative to jogging if lower back flares."

avoided_exercises:
  - name: "Barbell Back Squat"
    reason: "High spinal compressive load. Prohibited Months 1–4."
  - name: "Conventional Barbell Deadlift"
    reason: "High lumbar demand. Prohibited Months 1–3."
  - name: "Sit-Ups / Crunches"
    reason: "Flexion under load stresses lumbar discs."
  - name: "Behind-the-Neck Press"
    reason: "Cervical and shoulder risk."
  - name: "Standing Barbell Overhead Press"
    reason: "Lumbar hyperextension risk."
  - name: "Good Mornings"
    reason: "High lumbar loading with bar."
  - name: "Leg Extension Machine (high weight)"
    reason: "Knee shear force under heavy load."
